global
    log stdout local0
    maxconn 4000
    daemon

resolvers docker_resolver
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold valid 10s
    hold obsolete 30s

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor if-none
    option redispatch
    retries 3
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

stats enable
stats uri /haproxy-stats
stats refresh 30s
stats show-node

frontend health_check
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-desc HAProxy load balancer for BFT shard 1 aggregators

frontend shard1_frontend
    bind *:3000
    unique-id-format %{+X}o\ %ci:%cp_%fi:%fp_%Ts_%rt:%pid
    unique-id-header X-Request-ID
    capture request header User-Agent len 128
    capture request header Content-Type len 64
    default_backend shard1_backend

backend shard1_backend
    balance roundrobin
    stick-table type ip size 100k expire 30m
    stick on hdr_ip(X-Forwarded-For)
    option httpchk GET /health/leader
    http-check expect status 200
    option redispatch
    option abortonclose
    http-reuse always

    server shard1-node-a aggregator-bft-shard1:3000 proto h2 check inter 2s fastinter 1s downinter 5s fall 2 rise 2 on-marked-down shutdown-sessions weight 100 resolvers docker_resolver init-addr last,libc,none
    server shard1-node-b aggregator-bft-shard1-b:3000 proto h2 check inter 2s fastinter 1s downinter 5s fall 2 rise 2 on-marked-down shutdown-sessions weight 100 resolvers docker_resolver init-addr last,libc,none

    http-response set-header X-Backend-Server %s
    http-response set-header X-HAProxy-Server-ID %si
